<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税務期限管理ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --surface2: #f0efed;
    --border: #e2e0db;
    --accent: #d97757;
    --accent2: #c96442;
    --warn: #d4870a;
    --danger: #cc3f3f;
    --ok: #2a7a52;
    --text: #1a1a18;
    --text2: #6b6860;
    --text3: #a8a49d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7cf0; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger-ghost:hover { background: rgba(247,95,95,0.1); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── LAYOUT ── */
  .app { display: flex; height: calc(100vh - 56px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-title { font-size: 12px; color: var(--text2); letter-spacing: 0.08em; font-weight: 500; }
  .client-list { overflow-y: auto; flex: 1; }
  .client-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .client-item:hover { background: var(--surface2); }
  .client-item.active { background: #fdf3f0; border-left: 3px solid var(--accent); }
  .client-item.active { padding-left: 13px; }
  .client-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .client-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .alert-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--danger);
    flex-shrink: 0;
    margin-top: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MAIN ── */
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── WELCOME ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    gap: 12px;
    text-align: center;
  }
  .welcome-icon { font-size: 48px; opacity: 0.3; }
  .welcome h2 { font-size: 18px; color: var(--text2); font-weight: 400; }
  .welcome p { font-size: 13px; line-height: 1.7; }

  /* ── CLIENT HEADER ── */
  .client-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
  }
  .client-header-left h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .client-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }
  .tag-blue { color: #2a6db5; border-color: #aac4e8; background: #eef4fc; }
  .tag-purple { color: #6b46c1; border-color: #c4b5fd; background: #f3f0ff; }
  .tag-green { color: var(--ok); border-color: #86c9a8; background: #edf7f2; }
  .tag-orange { color: var(--warn); border-color: #f0c070; background: #fdf6e3; }
  .tag-red { color: var(--danger); border-color: #f0a0a0; background: #fdf0f0; }

  /* ── DEADLINE SECTION ── */
  .section-label {
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .deadline-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .deadline-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .deadline-card:hover { border-color: var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .deadline-card.urgent { border-left: 3px solid var(--danger); }
  .deadline-card.soon { border-left: 3px solid var(--warn); }
  .deadline-card.done { opacity: 0.5; }
  .deadline-card.na { opacity: 0.25; }

  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-category { font-size: 11px; color: var(--text3); }
  /* ステータスバッジは左ボーダーで表現するため非表示 */
  .card-status { display: none; }

  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .card-date {
    
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .deadline-card.urgent .card-date { color: var(--danger); }
  .deadline-card.soon .card-date { color: var(--warn); }
  .deadline-card.done .card-date { color: var(--text3); }
  .deadline-card.na .card-date { color: var(--text3); font-size: 12px; }

  .card-remaining { font-size: 11px; color: var(--text3); }
  .card-note { display: none; }

  .check-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
    color: transparent;
  }
  .check-btn:hover { border-color: var(--ok); color: var(--ok); }
  .check-btn.checked { background: var(--ok); border-color: var(--ok); color: #fff; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input, .form-select {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-input option, .form-select option { background: var(--bg); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
  .form-checkbox input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .summary-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    flex: 1;
    min-width: 100px;
    text-align: center;
  }
  .summary-num { font-size: 24px; font-weight: 700;  }
  .summary-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .num-urgent { color: var(--danger); }
  .num-soon { color: var(--warn); }
  .num-ok { color: var(--ok); }
  .num-done { color: var(--text3); }

  /* ── EMPTY ── */
  .empty-clients {
    padding: 24px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.8;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    .app { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
    .main { padding: 16px; }
    .deadline-grid { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 380px) {
    .deadline-grid { grid-template-columns: 1fr; }
  }

  /* ── TABS ── */
  .tab-switch {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .tab-btn {
    padding: 5px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active { background: var(--surface); color: var(--text); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── CALENDAR VIEW ── */
  .cal-view {
    flex: 1; display: flex; flex-direction: row;
    height: calc(100vh - 56px); overflow: hidden; gap: 0;
  }
  .cal-left {
    display: flex; flex-direction: column;
    flex: 1; padding: 20px 16px 20px 24px; overflow: hidden; min-width: 0;
  }
  .cal-right {
    width: 280px; min-width: 280px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .cal-right-empty {
    color: var(--text3); font-size: 12px; margin-top: 40px; text-align: center;
  }
  .cal-right-date {
    font-size: 14px; font-weight: 700; color: var(--text);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .cal-right-item {
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .cal-right-item:last-child { border-bottom: none; }
  .cal-right-client { font-size: 13px; font-weight: 600; color: var(--text); }
  .cal-right-title { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cal-right-item.ri-urgent .cal-right-client { color: var(--danger); }
  .cal-right-item.ri-soon .cal-right-client { color: var(--warn); }
  .cal-right-item.ri-done .cal-right-client { color: var(--text3); text-decoration: line-through; }
  .cal-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .cal-title {
    font-size: 16px;
    font-weight: 700;
    min-width: 120px;
    text-align: center;
  }
  .cal-grid-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
  }
  .cal-grid-header > div {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 4px 0;
    font-weight: 600;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    gap: 2px;
    flex: 1;
    overflow: hidden;
  }
  .cal-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .cal-cell.other-month { opacity: 0.3; }
  .cal-cell.today { border-color: var(--accent); background: #fdf8f6; }
  .cal-cell.has-urgent { border-color: rgba(204,63,63,0.4); background: #fdf5f5; }
  .cal-cell.has-soon { border-color: rgba(212,135,10,0.3); background: #fdf9f0; }
  .cal-day {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 3px;
    flex-shrink: 0;
  }
  .cal-cell.today .cal-day { color: var(--accent); font-weight: 700; }
  .cal-cell.other-month .cal-day { color: var(--text3); }
  .cal-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }
  .cal-event {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    line-height: 1.6;
    flex-shrink: 0;
  }
  .cal-event.ev-urgent { background: rgba(204,63,63,0.1); color: #cc3f3f; }
  .cal-event.ev-soon   { background: rgba(212,135,10,0.1); color: #a06608; }
  .cal-event.ev-ok     { background: rgba(217,119,87,0.1); color: #b05e3a; }
  .cal-event.ev-done   { background: var(--surface2); color: var(--text3); text-decoration: line-through; }
  .cal-cell.selected { border-color: var(--accent) !important; background: #fdf3f0 !important; }
    font-size: 11px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .badge-urgent { color: #cc3f3f; }
  .badge-soon   { color: #a06608; }
  .badge-ok     { color: var(--text2); font-weight: 400; }
  .badge-done   { color: var(--text3); font-size: 10px; }
    font-size: 10px;
    color: var(--text3);
    padding: 1px 4px;
    flex-shrink: 0;
  }

  /* カレンダーポップオーバー */
  .cal-popover {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    width: 260px;
    z-index: 150;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .cal-popover h3 { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .cal-pop-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .cal-pop-item:last-child { border-bottom: none; }
  .cal-pop-client { font-weight: 600; color: var(--text); }
  .cal-pop-title { color: var(--text2); margin-top: 1px; }

  @media (max-width: 640px) {
    .cal-view { padding: 12px; }
    .cal-event { font-size: 9px; }
    .btn-label-full { display: none; }
    .btn-label-short { display: inline; }
    header { padding: 0 12px; gap: 6px; }
    .btn { padding: 6px 10px; font-size: 12px; }
  }
  @media (min-width: 641px) {
    .btn-label-short { display: none; }
    .btn-label-full { display: inline; }
  }
  /* ── 重要予定 ── */
  .memo-section { margin-top: 8px; }
  .memo-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .memo-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .memo-item.memo-urgent { border-left: 3px solid var(--danger); }
  .memo-item.memo-soon   { border-left: 3px solid var(--warn); }
  .memo-date {  font-size: 13px; color: var(--text); white-space: nowrap; min-width: 86px; }
  .memo-item.memo-urgent .memo-date { color: var(--danger); }
  .memo-item.memo-soon   .memo-date { color: var(--warn); }
  .memo-text { font-size: 13px; color: var(--text2); flex: 1; }
  .memo-remaining { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .memo-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 2px 4px; border-radius: 4px; }
  .memo-del:hover { color: var(--danger); background: rgba(204,63,63,0.08); }
  .memo-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .memo-add-row input[type=date], .memo-add-row input[type=text] {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px;
    font-family: inherit; font-size: 13px; background: var(--bg); color: var(--text); outline: none;
  }
  .memo-add-row input[type=date] { width: 140px; }
  .memo-add-row input[type=text] { flex: 1; min-width: 160px; }
  .memo-add-row input:focus { border-color: var(--accent); }
  /* ── 顧問料ビュー ── */
  .fee-view {
    flex: 1; display: flex; flex-direction: column;
    height: calc(100vh - 56px); padding: 20px 24px; overflow: hidden;
  }
  .fee-header { margin-bottom: 16px; }
  .fee-summary {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .fee-summary-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px; text-align: center;
  }
  .fee-summary-item .num {
    font-size: 22px; font-weight: 700; color: var(--accent);
  }
  .fee-summary-item .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .fee-table-wrap { flex: 1; overflow-y: auto; }
  .fee-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .fee-table th {
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 10px 14px; text-align: left; font-size: 11px;
    color: var(--text2); font-weight: 600; letter-spacing: 0.05em;
    position: sticky; top: 0;
  }
  .fee-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    color: var(--text); vertical-align: middle;
  }
  .fee-table tr:hover td { background: var(--surface2); }
  .fee-table .num-cell { text-align: right; font-variant-numeric: tabular-nums; }
  .fee-table tfoot td {
    font-weight: 700; background: var(--surface);
    border-top: 2px solid var(--border); border-bottom: none;
    color: var(--text);
  }
  .fee-empty { color: var(--text3); font-size: 12px; }
  .fee-note { font-size: 11px; color: var(--text3); }

  /* ── TOAST ── */
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--ok);
    color: var(--ok);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 300;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">税務<span>期限</span>マネージャー</div>
  <div class="tab-switch">
    <button class="tab-btn active" id="tab-detail" onclick="switchTab('detail')">個別詳細</button>
    <button class="tab-btn" id="tab-calendar" onclick="switchTab('calendar')">カレンダー</button>
    <button class="tab-btn" id="tab-fee" onclick="switchTab('fee')">顧問料</button>
  </div>
  <div class="header-right">
    <span id="sync-status" style="font-size:11px;color:var(--text3)">接続中…</span>
    <button class="btn btn-ghost" onclick="resetAndSeed()"><span class="btn-label-full">再登録</span><span class="btn-label-short">再登録</span></button>

<script>
// ── GAS設定 ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw6XBGerMBoRbxllKUh1onHcNkwq_rjpQ-Bufp03SyoQqCOYqigojHLxLaLsySUqstI/exec';

// ── DATA ──
let clients = JSON.parse(localStorage.getItem('tax_clients') || '[]');
let completions = JSON.parse(localStorage.getItem('tax_completions') || '{}');
let memos = JSON.parse(localStorage.getItem('tax_memos') || '{}');
let selectedId = null;
let saveTimer = null;

// ── INIT ──
const currentYear = new Date().getFullYear();

// ── GAS読み込み ──
async function loadFromGAS() {
  showSyncStatus('読み込み中…');
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const data = await res.json();
    let updated = false;
    if (data.clients && data.clients.length > 0) {
      clients = data.clients;
      localStorage.setItem('tax_clients', JSON.stringify(clients));
      updated = true;
    }
    if (data.completions && Object.keys(data.completions).length > 0) {
      completions = data.completions;
      localStorage.setItem('tax_completions', JSON.stringify(completions));
    }
    if (data.memos && Object.keys(data.memos).length > 0) {
      memos = data.memos;
      localStorage.setItem('tax_memos', JSON.stringify(memos));
    }
    if (!updated) {
      seedInitialClients();
      await saveToGAS();
    }
    showSyncStatus('同期済み ✓', true);
  } catch(e) {
    showSyncStatus('オフライン', false, true);
    if (clients.length === 0) { seedInitialClients(); }
  }
  renderSidebar();
  renderWelcome();
}

// ── GAS保存 ──
async function saveToGAS() {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action:'saveAll', clients, completions, memos })
    });
    showSyncStatus('同期済み ✓', true);
  } catch(e) {
    showSyncStatus('保存失敗（ローカル保存済み）', false, true);
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToGAS, 1500);
}

function showSyncStatus(msg, ok=false, warn=false) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = ok ? 'var(--ok)' : warn ? 'var(--warn)' : 'var(--text3)';
}

// ── SEED ──
function seedInitialClients() {
  if (clients.length > 0) return; // すでにデータあり
  const y = currentYear;
  // { name, month, year, kojin, extension, chukan, special, jizen, shokyaku, kantan }
  const seed = [
    // 1月決算
    { name:'㈱JIMS',                       month:1,  kojin:false, extension:false },
    { name:'フェルマー合同会社',            month:1,  kojin:false, extension:false },
    // 2月決算
    { name:'㈱ヴィレッジ',                  month:2,  kojin:false, extension:false },
    { name:'アコンシェルf',                 month:2,  kojin:false, extension:true  },
    // 3月決算
    { name:'合同会社T&P',                   month:3,  kojin:false, extension:false },
    { name:'㈱藤田工務店',                  month:3,  kojin:false, extension:false },
    { name:'ヒカリ電機',                    month:3,  kojin:false, extension:false, fyend:`${y}-03-20` },
    // 4月決算
    { name:'㈱きらめきラボ',                month:4,  kojin:false, extension:false },
    { name:'合同会社エムズアイ',            month:4,  kojin:false, extension:false },
    // 5月決算
    { name:'㈱KIU',                         month:5,  kojin:false, extension:false },
    { name:'㈱フルリール',                  month:5,  kojin:false, extension:false },
    // 8月決算
    { name:'㈲エコ・ハウス',                month:8,  kojin:false, extension:false },
    { name:'㈲西川住宅流通',                month:8,  kojin:false, extension:false },
    // 9月決算
    { name:'㈱リセスタハウジング',          month:9,  kojin:false, extension:false },
    // 10月決算
    { name:'㈱カスガ機工',                  month:10, kojin:false, extension:false },
    // 11月決算
    { name:'㈱GUコーポレーション',          month:11, kojin:false, extension:false },
    // 12月決算（個人）
    { name:'トーラス 太田英樹',             month:12, kojin:true,  extension:false },
    { name:'神栄自動車 大形',               month:12, kojin:true,  extension:false },
    { name:'久原ルミ',                      month:12, kojin:true,  extension:false },
    { name:'西川正代',                      month:12, kojin:true,  extension:false },
    { name:'田中泰儀',                      month:12, kojin:true,  extension:false },
    { name:'三田将平',                      month:12, kojin:true,  extension:false },
    { name:'伴 祥高',                       month:12, kojin:true,  extension:false },
    { name:'萩本',                          month:12, kojin:true,  extension:false },
    // 12月決算（法人）
    { name:'㈱エムイットシステム',          month:12, kojin:false, extension:false },
    { name:'一般社団法人ジェントルハンズ',  month:12, kojin:false, extension:false },
  ];
  seed.forEach((s, i) => {
    const lastDay = new Date(y, s.month, 0).getDate();
    const fyend = s.fyend || `${y}-${String(s.month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    clients.push({
      id: (Date.now() + i).toString(),
      name: s.name,
      fyend,
      kojin: s.kojin,
      extension: s.extension,
      chukan: '0',
      special: false,
      jizen: false,
      shokyaku: false,
      kantan: false,
    });
  });
}

// ── 起動 ──
loadFromGAS();

// ── SAVE / RENDER ──
function save() {
  localStorage.setItem('tax_clients', JSON.stringify(clients));
  scheduleSave();
  renderSidebar();
  if (selectedId) {
    const c = clients.find(x => x.id === selectedId);
    if (c) renderMain(c); else renderWelcome();
  }
}

function renderSidebar() {
  const list = document.getElementById('client-list');
  document.getElementById('client-count').textContent = clients.length + '社';
  if (!clients.length) {
    list.innerHTML = '<div class="empty-clients">顧問先がまだいません。<br>「顧問先を追加」から<br>登録してください。</div>';
    return;
  }
  list.innerHTML = clients.map(c => {
    const deadlines = calcDeadlines(c);
    const hasAlert = deadlines.some(d => (d.status === 'urgent' || d.status === 'soon') && !isCompleted(c.id, d.key));
    return `<div class="client-item${c.id === selectedId ? ' active' : ''}" onclick="selectClient('${c.id}')">
      <div>
        <div class="client-name">${escHtml(c.name)}</div>
        <div class="client-meta">${c.kojin ? '個人' : clientFyLabel(c)}</div>
      </div>
      ${hasAlert ? '<div class="alert-dot"></div>' : ''}
    </div>`;
  }).join('');
}

function renderWelcome() {
  document.getElementById('main-area').innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">📋</div>
      <h2>顧問先を選んでください</h2>
      <p>左のサイドバーから顧問先を選ぶと<br>税務期限の一覧が表示されます。</p>
    </div>`;
}

function renderMain(c) {
  const deadlines = calcDeadlines(c);
  const urgentN = deadlines.filter(d => d.status === 'urgent' && !isCompleted(c.id, d.key)).length;
  const soonN = deadlines.filter(d => d.status === 'soon' && !isCompleted(c.id, d.key)).length;
  const okN = deadlines.filter(d => d.status === 'ok' && !isCompleted(c.id, d.key)).length;
  const doneN = deadlines.filter(d => isCompleted(c.id, d.key)).length;

  const chukanLabel = {'0':'中間なし','1':'消費税中間年1回','3':'消費税中間年3回','11':'消費税中間年11回'}[String(c.chukan||0)];
  const fyLabel = clientFyLabel(c);
  const tags = [
    c.kojin ? `<span class="tag tag-orange">個人</span>` : `<span class="tag tag-blue">${fyLabel}</span>`,
    c.extension ? `<span class="tag tag-purple">申告延長あり</span>` : '',
    c.kantan ? `<span class="tag tag-green">簡易課税</span>` : '',
    c.special ? `<span class="tag tag-orange">源泉納期特例</span>` : '',
    c.jizen ? `<span class="tag tag-red">事前確定届出給与</span>` : '',
    (c.chukan && c.chukan !== '0') ? `<span class="tag tag-purple">${chukanLabel}</span>` : '',
  ].filter(Boolean).join('');

  // group（キーはcalcDeadlinesが生成したものを category で束ねる）
  const groupOrder = ['申告・納付', '消費税 中間申告', '源泉所得税', '各種届出'];
  const grouped = {};
  deadlines.forEach(d => {
    if (!grouped[d.category]) grouped[d.category] = [];
    grouped[d.category].push(d);
  });

  let groupHtml = '';
  groupOrder.forEach(label => {
    const cards = grouped[label];
    if (!cards || !cards.length) return;
    const html = cards.map(d => renderCard(c.id, d)).join('');
    groupHtml += `<div class="section-label">${label}</div><div class="deadline-grid">${html}</div>`;
  });

  document.getElementById('main-area').innerHTML = `
    <div class="client-header">
      <div class="client-header-left">
        <h1>${escHtml(c.name)}</h1>
        <div class="client-tags">${tags}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="openEditModal('${c.id}')">編集</button>
    </div>
    <div class="summary-bar">
      <div class="summary-item"><div class="summary-num num-urgent">${urgentN}</div><div class="summary-label">期限間近（30日以内）</div></div>
      <div class="summary-item"><div class="summary-num num-soon">${soonN}</div><div class="summary-label">要注意（60日以内）</div></div>
      <div class="summary-item"><div class="summary-num num-ok">${okN}</div><div class="summary-label">余裕あり</div></div>
      <div class="summary-item"><div class="summary-num num-done">${doneN}</div><div class="summary-label">完了済み</div></div>
    </div>
    ${groupHtml}
    <div class="section-label memo-section">重要予定</div>
    <div id="memo-list-${c.id}" class="memo-list"></div>
    <div class="memo-add-row">
      <input type="date" id="memo-date-${c.id}">
      <input type="text" id="memo-text-${c.id}" placeholder="内容を入力…" onkeydown="if(event.key==='Enter')addMemo('${c.id}')">

  const cardCls = done ? 'done' : (d.status === 'na' ? 'na' : d.status);
  const remaining = d.status === 'na' ? '' : `<div class="card-remaining">${d.remaining}</div>`;
  const note = d.note ? `<div class="card-note">💡 ${d.note}</div>` : '';
  return `<div class="deadline-card ${cardCls}">
    <button class="check-btn ${done ? 'checked' : ''}" onclick="toggleComplete('${clientId}','${d.key}')" title="完了にする">✓</button>

    </div>
    <div class="card-title">${d.title}</div>

// ── DEADLINE CALC ──
function calcDeadlines(c) {
  const today = new Date(); today.setHours(0,0,0,0);

  // 決算日：新データはfyend('YYYY-MM-DD')、旧データはmonth/yearから復元
  let fyEnd;
  if (c.fyend) {
    fyEnd = new Date(c.fyend + 'T00:00:00');
  } else {
    const m = parseInt(c.month), y = parseInt(c.year);
    fyEnd = lastDayOfMonth(y, m);
  }
  const month = fyEnd.getMonth() + 1; // 1ベース（サイドバー表示用）
  // 翌期首
  const nextStart = new Date(fyEnd); nextStart.setDate(nextStart.getDate() + 1);

  const deadlines = [];

  // ① 申告期限（法人 or 個人）
  if (c.kojin) {
    // 個人：所得税3/15、消費税3/31
    // 3/15を過ぎたら両方とも翌年扱いに統一
    const y = today.getFullYear();
    const shotokuBase = new Date(y, 2, 15);
    const baseYear = today > shotokuBase ? y + 1 : y;
    const shotokuDate = new Date(baseYear, 2, 15);
    const shohizeiKojinDate = new Date(baseYear, 2, 31);
    deadlines.push(makeDeadline(today, 'houjin', '申告・納付', '所得税 確定申告', shotokuDate, null));
    deadlines.push(makeDeadline(today, 'shohizei', '申告・納付', '消費税 確定申告', shohizeiKojinDate, null));
  } else {
    // 法人
    const houjinBase = addMonths(fyEnd, c.extension ? 3 : 2);
    deadlines.push(makeDeadline(today, 'houjin', '申告・納付', '法人税・地方法人税', houjinBase, null));
    const shohizeiBase = addMonths(fyEnd, c.extension ? 3 : 2);
    deadlines.push(makeDeadline(today, 'shohizei', '申告・納付', '消費税 確定申告', shohizeiBase, null));
  }

  // ③ 法人税 中間申告（期首から6ヶ月後の前日 → +2ヶ月）
  const houjinChukanPeriodEnd = prevDay(addMonths(nextStart, 6));
  const houjinChukanDeadline = addMonths(houjinChukanPeriodEnd, 2);
  deadlines.push(makeDeadline(today, 'houjin_chukan', '申告・納付', '法人税 中間申告', houjinChukanDeadline, null));

  // ④ 消費税 中間申告（回数別）
  const chukanCount = parseInt(c.chukan || 0);

  if (chukanCount === 0) {
    deadlines.push({ key:'ct_none', category:'消費税 中間申告', title:'消費税 中間申告', dateStr:'対象外', status:'na', remaining:'', note:null });

  } else if (chukanCount === 1) {
    // 年1回：期首から6ヶ月後の前日 → +2ヶ月
    const periodEnd1 = prevDay(addMonths(nextStart, 6));
    const d1 = addMonths(periodEnd1, 2);
    deadlines.push(makeDeadline(today, 'ct1_1', '消費税 中間申告', '消費税 中間申告（年1回）', d1, null));

  } else if (chukanCount === 3) {
    // 年3回：期首から3・6・9ヶ月後の前日 → +2ヶ月
    [1, 2, 3].forEach(n => {
      const periodEnd = prevDay(addMonths(nextStart, n * 3));
      const deadline = addMonths(periodEnd, 2);
      deadlines.push(makeDeadline(today, `ct3_${n}`, '消費税 中間申告',
        `消費税 中間申告 第${n}回`, deadline, null));
    });

  } else if (chukanCount === 11) {
    // 年11回：期首からi ヶ月後の前日 → +2ヶ月
    for (let i = 1; i <= 11; i++) {
      const periodEnd = prevDay(addMonths(nextStart, i));
      const deadline = addMonths(periodEnd, 2);
      const diff = Math.ceil((deadline - today) / 86400000);
      if (diff < -5 || diff > 120) continue;
      deadlines.push(makeDeadline(today, `ct11_${i}`, '消費税 中間申告',
        `消費税 中間申告 第${i}回`, deadline, null));
    }
    if (!deadlines.find(d => d.key && d.key.startsWith('ct11_'))) {
      deadlines.push({ key:'ct11_none', category:'消費税 中間申告', title:'消費税 中間申告（年11回）', dateStr:'直近の期限なし', status:'na', remaining:'', note:null });
    }
  }

  // ⑤ 源泉所得税 毎月納付
  if (!c.special) {
    const gensenDate = nextTenthOfMonth(today);
    deadlines.push(makeDeadline(today, 'gensen_regular', '源泉所得税', '源泉所得税 毎月納付', gensenDate, null));
  } else {
    deadlines.push({ key:'gensen_regular', category:'源泉所得税', title:'源泉所得税 毎月納付', dateStr:'納期特例適用中', status:'na', remaining:'', note:null });
  }

  // ⑥ 源泉 納期特例
  if (c.special) {
    const y = today.getFullYear();
    let sp1 = new Date(y, 6, 10);
    let sp2 = new Date(y, 0, 20);
    if (today > sp2) sp2 = new Date(y + 1, 0, 20);
    deadlines.push(makeDeadline(today, 'gensen_special1', '源泉所得税', '源泉納期特例 1〜6月分', sp1, null));
    deadlines.push(makeDeadline(today, 'gensen_special2', '源泉所得税', '源泉納期特例 7〜12月分', sp2, null));
  } else {
    deadlines.push({ key:'gensen_special1', category:'源泉所得税', title:'源泉納期特例 1〜6月分', dateStr:'毎月納付のため対象外', status:'na', remaining:'', note:null });
    deadlines.push({ key:'gensen_special2', category:'源泉所得税', title:'源泉納期特例 7〜12月分', dateStr:'毎月納付のため対象外', status:'na', remaining:'', note:null });
  }

  // ⑦ 事前確定届出給与（期首から4ヶ月以内 = 期首月含む4ヶ月目の月末）
  if (c.jizen) {
    const jizenDate = prevDay(addMonths(nextStart, 4));
    deadlines.push(makeDeadline(today, 'jizen_deadline', '各種届出', '事前確定届出給与 届出', jizenDate, null));
  } else {
    deadlines.push({ key:'jizen_deadline', category:'各種届出', title:'事前確定届出給与 届出', dateStr:'対象外', status:'na', remaining:'', note:null });
  }

  // ⑧ 簡易課税選択届出（課税事業者選択は削除）
  const kantanDate = fyEnd;
  if (c.kantan) {
    deadlines.push(makeDeadline(today, 'kantan_deadline', '各種届出', '簡易課税 選択不適用届出', kantanDate, null));
  } else {
    deadlines.push(makeDeadline(today, 'kantan_deadline', '各種届出', '簡易課税 選択届出', kantanDate, null));
  }

  // ⑨ 償却資産申告（1月31日）
  if (c.shokyaku) {
    const y = today.getFullYear();
    let shokyakuDate = new Date(y, 0, 31);
    if (today > shokyakuDate) shokyakuDate = new Date(y + 1, 0, 31);
    deadlines.push(makeDeadline(today, 'shokyaku', '各種届出', '償却資産申告', shokyakuDate, null));
  } else {
    deadlines.push({ key:'shokyaku', category:'各種届出', title:'償却資産申告', dateStr:'対象外', status:'na', remaining:'', note:null });
  }

  // ⑩ 法定調書合計表・給与支払報告書（毎年1月31日）
  {
    const y = today.getFullYear();
    let hoteiDate = new Date(y, 0, 31);
    if (today > hoteiDate) hoteiDate = new Date(y + 1, 0, 31);
    deadlines.push(makeDeadline(today, 'hotei', '各種届出', '法定調書合計表・給与支払報告書', hoteiDate, null));
  }

  return deadlines;
}

function makeDeadline(today, key, category, title, date, note) {
  const diff = Math.ceil((date - today) / 86400000);
  let status, remaining;
  if (diff < 0) {
    status = 'urgent'; remaining = `${Math.abs(diff)}日超過`;
  } else if (diff <= 30) {
    status = 'urgent'; remaining = `あと${diff}日`;
  } else if (diff <= 60) {
    status = 'soon'; remaining = `あと${diff}日`;
  } else {
    status = 'ok'; remaining = `あと${diff}日`;
  }
  return { key, category, title, dateStr: formatDate(date), date, status, remaining, note };
}

// ── HELPERS ──
function lastDayOfMonth(year, month) {
  return new Date(year, month, 0);
}
// 月末日にsetMonthすると日数超過で繰り越しが起きるため1日に固定してから加算
function addMonthsSafe(date, m) {
  const d = new Date(date.getFullYear(), date.getMonth(), 1);
  d.setMonth(d.getMonth() + m);
  return d;
}
function toMonthEnd(date) {
  return new Date(date.getFullYear(), date.getMonth() + 1, 0);
}
function prevDay(date) {
  const d = new Date(date); d.setDate(d.getDate() - 1); return d;
}
// date の月を起点に addM ヶ月後の月末（繰り越し防止済み）
function monthEndAfter(date, addM) {
  return toMonthEnd(addMonthsSafe(date, addM));
}
function addMonths(date, m) {
  // 月末決算 → N ヶ月後の月末
  // 月中決算 → N ヶ月後の同日（存在しなければ月末に丸める）
  const isMonthEnd = date.getDate() === new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
  const mo = date.getMonth() + m;
  if (isMonthEnd) {
    return new Date(date.getFullYear(), mo + 1, 0);
  } else {
    const targetLastDay = new Date(date.getFullYear(), mo + 1, 0).getDate();
    return new Date(date.getFullYear(), mo, Math.min(date.getDate(), targetLastDay));
  }
}
function nextTenthOfMonth(today) {
  const y = today.getFullYear(), m = today.getMonth();
  let d = new Date(y, m, 10);
  if (today >= d) d = new Date(y, m + 1, 10);
  return d;
}
function formatDate(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function isCompleted(clientId, key) {
  return !!(completions[clientId] && completions[clientId][key]);
}

function saveMemos() {

function renderMemoList(clientId) {
  const el = document.getElementById(`memo-list-${clientId}`);
  if (!el) return;
  const list = (memos[clientId] || []).slice().sort((a,b) => a.date.localeCompare(b.date));
  const today = new Date(); today.setHours(0,0,0,0);
  if (!list.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 0">予定なし</div>';
    return;
  }
  el.innerHTML = list.map(m => {
    const d = new Date(m.date + 'T00:00:00');
    const diff = Math.ceil((d - today) / 86400000);
    const cls = diff < 0 ? 'memo-urgent' : diff <= 30 ? 'memo-urgent' : diff <= 60 ? 'memo-soon' : '';
    const rem = diff < 0 ? `${Math.abs(diff)}日超過` : `あと${diff}日`;
    const dateLabel = m.date.replace(/-/g, '/');
    return `<div class="memo-item ${cls}">
      <span class="memo-date">${dateLabel}</span>
      <span class="memo-text">${escHtml(m.text)}</span>
      <span class="memo-remaining">${rem}</span>
      <button class="memo-del" onclick="deleteMemo('${clientId}','${m.id}')" title="削除">×</button>
    </div>`;
  }).join('');
}

function addMemo(clientId) {
  const dateEl = document.getElementById(`memo-date-${clientId}`);
  const textEl = document.getElementById(`memo-text-${clientId}`);
  const date = dateEl.value;
  const text = textEl.value.trim();
  if (!date || !text) { showToast('日付と内容を入力してください'); return; }
  if (!memos[clientId]) memos[clientId] = [];
  memos[clientId].push({ id: Date.now().toString(), date, text });
  saveMemos();
  textEl.value = '';
  dateEl.value = '';
  renderMemoList(clientId);
  renderSidebar(); // カレンダー更新のため
}

function deleteMemo(clientId, memoId) {
  if (!memos[clientId]) return;
  memos[clientId] = memos[clientId].filter(m => m.id !== memoId);
  saveMemos();
  renderMemoList(clientId);
  renderSidebar();
}

function exportCSV() {
  if (!clients.length) { alert('顧問先が登録されていません'); return; }
  let csv = '\uFEFF法人名,決算月,項目,期限日,ステータス\n';
  clients.forEach(c => {
    const deadlines = calcDeadlines(c);
    deadlines.forEach(d => {
      if (d.status === 'na') return;
      const status = isCompleted(c.id, d.key) ? '完了' : { urgent:'期限間近', soon:'要注意', ok:'余裕あり' }[d.status];
      csv += `"${c.name}","${c.month}月","${d.title}","${d.dateStr}","${status}"\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `税務期限_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
}

  document.getElementById('fee-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('fm-monthly').focus(), 100);
}
function saveFeeEdit() {
  const id = document.getElementById('fm-id').value;
  const i = clients.findIndex(x => x.id === id);
  clients[i].feeMonthly = parseInt(document.getElementById('fm-monthly').value) || 0;
  clients[i].feeClosing = parseInt(document.getElementById('fm-closing').value) || 0;
  clients[i].feeYearend = parseInt(document.getElementById('fm-yearend').value) || 0;
  clients[i].feeNote = document.getElementById('fm-note').value.trim();
  closeModal('fee-modal');
  save();
  renderFee();
  showToast('保存しました');
}

// ── 顧問料ビュー ──
function renderFee() {
  const fmt = n => n ? n.toLocaleString() + '円' : '<span class="fee-empty">未設定</span>';
  let totalMonthly = 0, totalClosing = 0, totalAnnual = 0;

  const rows = clients.map(c => {
    const monthly = c.feeMonthly || 0;
    const closing = c.feeClosing || 0;
    const yearend = c.feeYearend || 0;
    const annual = monthly * 12 + closing + yearend;
    totalMonthly += monthly;
    totalClosing += closing;
    totalAnnual += annual;
    return `<tr>
      <td>${escHtml(c.name)}</td>
      <td class="num-cell">${fmt(monthly)}</td>
      <td class="num-cell">${fmt(closing)}</td>
      <td class="num-cell">${fmt(yearend)}</td>
      <td class="num-cell" style="color:var(--accent);font-weight:600">${annual ? annual.toLocaleString()+'円' : '<span class="fee-empty">-</span>'}</td>
      <td><span class="fee-note">${escHtml(c.feeNote||'')}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="openFeeEdit('${c.id}')">編集</button></td>
    </tr>`;
  }).join('');

  document.getElementById('fee-tbody').innerHTML = rows;
  document.getElementById('fee-tfoot').innerHTML = `<tr>
    <td>合計 ${clients.length}社</td>
    <td class="num-cell">${totalMonthly.toLocaleString()}円</td>
    <td class="num-cell">${totalClosing.toLocaleString()}円</td>
    <td class="num-cell">${(clients.reduce((s,c)=>s+(c.feeYearend||0),0)).toLocaleString()}円</td>
    <td class="num-cell" style="color:var(--accent)">${totalAnnual.toLocaleString()}円</td>
    <td></td><td></td>
  </tr>`;

  document.getElementById('fee-summary').innerHTML = `
    <div class="fee-summary-item"><div class="num">${(totalMonthly).toLocaleString()}円</div><div class="lbl">月額合計</div></div>
    <div class="fee-summary-item"><div class="num">${(totalAnnual).toLocaleString()}円</div><div class="lbl">年額合計（×12＋決算料）</div></div>
    <div class="fee-summary-item"><div class="num">${clients.filter(c=>!c.feeMonthly&&!c.feeClosing&&!c.feeYearend).length}社</div><div class="lbl">未設定</div></div>`;
}


let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0ベース
let calPopover = null;

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }
function calToday() { calYear = new Date().getFullYear(); calMonth = new Date().getMonth(); renderCalendar(); }

// 全顧問先の期限を日付→イベントのマップに変換
function buildEventMap() {
  const map = {}; // key: 'YYYY-MM-DD' → [{clientName, title, status, clientId, deadlineKey}]
  const today = new Date(); today.setHours(0,0,0,0);
  clients.forEach(c => {
    const deadlines = calcDeadlines(c);
    deadlines.forEach(d => {
      if (d.status === 'na') return;
      const done = isCompleted(c.id, d.key);
      const key = d.dateStr.replace(/\//g, '-');
      if (!map[key]) map[key] = [];
      map[key].push({ clientName: c.name, title: d.title, status: done ? 'done' : d.status, clientId: c.id, deadlineKey: d.key, done });
    });
  });
  // メモ（重要予定）も追加
  Object.entries(memos).forEach(([clientId, list]) => {
    const c = clients.find(x => x.id === clientId);
    if (!c) return;
    (list || []).forEach(m => {
      const key = m.date; // already 'YYYY-MM-DD'
      if (!map[key]) map[key] = [];
      const d = new Date(m.date + 'T00:00:00');
      const diff = Math.ceil((d - today) / 86400000);
      const status = diff <= 30 ? 'urgent' : diff <= 60 ? 'soon' : 'ok';
      map[key].push({ clientName: c.name, title: m.text, status, clientId, deadlineKey: 'memo_' + m.id, done: false });
    });
  });
  return map;
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${calYear}年 ${calMonth + 1}月`;
  const today = new Date(); today.setHours(0,0,0,0);
  const eventMap = buildEventMap();

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=日
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // 6週 × 7日 = 42セル
  const totalCells = 42;
  for (let i = 0; i < totalCells; i++) {
    let day, month, year, isOther = false;
    if (i < firstDay) {
      day = daysInPrev - firstDay + i + 1;
      month = calMonth - 1; year = calYear;
      if (month < 0) { month = 11; year--; }
      isOther = true;
    } else if (i >= firstDay + daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      month = calMonth + 1; year = calYear;
      if (month > 11) { month = 0; year++; }
      isOther = true;
    } else {
      day = i - firstDay + 1;
      month = calMonth; year = calYear;
    }

    const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = !isOther && year === today.getFullYear() && month === today.getMonth() && day === today.getDate();
    const events = eventMap[dateKey] || [];
    const hasUrgent = events.some(e => e.status === 'urgent');
    const hasSoon = events.some(e => e.status === 'soon');

    const cell = document.createElement('div');
    cell.className = 'cal-cell' +
      (isOther ? ' other-month' : '') +
      (isToday ? ' today' : '') +
      (hasUrgent ? ' has-urgent' : hasSoon ? ' has-soon' : '');

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day';
    dayEl.textContent = day;
    cell.appendChild(dayEl);

    if (events.length > 0) {
      const eventsEl = document.createElement('div');
      eventsEl.className = 'cal-events';

      // 件数バッジ（urgent/soonを優先表示）
      const urgentN = events.filter(e => e.status === 'urgent').length;
      const soonN = events.filter(e => e.status === 'soon').length;
      const okN = events.filter(e => e.status === 'ok').length;
      const doneN = events.filter(e => e.status === 'done').length;

      if (urgentN) {
        const b = document.createElement('div');
        b.className = 'cal-badge badge-urgent';
        b.textContent = `🔴 ${urgentN}件`;
        eventsEl.appendChild(b);
      }
      if (soonN) {
        const b = document.createElement('div');
        b.className = 'cal-badge badge-soon';
        b.textContent = `🟡 ${soonN}件`;
        eventsEl.appendChild(b);
      }
      if (okN) {
        const b = document.createElement('div');
        b.className = 'cal-badge badge-ok';
        b.textContent = `${okN}件`;
        eventsEl.appendChild(b);
      }
      if (doneN) {
        const b = document.createElement('div');
        b.className = 'cal-badge badge-done';
        b.textContent = `✓${doneN}`;
        eventsEl.appendChild(b);
      }

      cell.appendChild(eventsEl);
    }

    if (events.length > 0) {
      cell.style.cursor = 'pointer';
      const dateLabel = `${year}/${String(month+1).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
      cell.addEventListener('click', function() {
        showCalDetail(dateLabel, events);
        // アクティブセルのハイライト
        document.querySelectorAll('.cal-cell.selected').forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
      });
    }

    grid.appendChild(cell);
  }
}

function showCalDetail(dateLabel, events) {
  const panel = document.getElementById('cal-right');
  panel.innerHTML = `<div class="cal-right-date">📅 ${dateLabel}　<span style="font-size:11px;color:var(--text3)">${events.length}件</span></div>` +
    events.map(ev => `
      <div class="cal-right-item ri-${ev.status}">
        <div class="cal-right-client">${escHtml(ev.clientName)}</div>
        <div class="cal-right-title">${escHtml(ev.title)}</div>
      </div>`).join('');
}
